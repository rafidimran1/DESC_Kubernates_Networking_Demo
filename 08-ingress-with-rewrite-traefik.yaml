apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-shop-prefix
  namespace: service-ingress-demo
spec:
  stripPrefix:
    prefixes:
    - /products
    - /orders
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shop-ingress-rewrite
  namespace: service-ingress-demo
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: service-ingress-demo-strip-shop-prefix@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
  - host: shop.local
    http:
      paths:
      - path: /products
        pathType: Prefix
        backend:
          service:
            name: products-service
            port:
              number: 8080
      - path: /orders
        pathType: Prefix
        backend:
          service:
            name: orders-service
            port:
              number: 8080
